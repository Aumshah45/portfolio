<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Security: CSP — blocks eval (the Lighthouse warning), allows inline for the font defer trick -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
    />

    <!-- Primary -->
    <title>Aum Shah — Full-Stack Developer & AI Engineer</title>
    <meta name="description" content="Aum Shah — full-stack developer at Sun Life Global Solutions, available for freelance projects. Web apps, dashboards, and agentic AI built end-to-end." />
    <meta name="author" content="Aum Shah" />
    <meta name="theme-color" content="#b45309" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://portfolio-seven-rho-22.vercel.app/" />
    <meta property="og:title" content="Aum Shah — Full-Stack Developer & AI Engineer" />
    <meta property="og:description" content="Available for freelance projects. Web apps, dashboards, and agentic AI built end-to-end. Employee of the Quarter at Sun Life Global Solutions, published researcher." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Aum Shah — full-stack developer & AI engineer, available for freelance" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aum Shah — Full-Stack Developer & AI Engineer" />
    <meta name="twitter:description" content="Available for freelance projects. Web apps, dashboards, and agentic AI built end-to-end." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Fonts: preconnect + non-blocking load (eliminates render-blocking warning) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:opsz,wght,SOFT@9..144,400..900,0..100&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:opsz,wght,SOFT@9..144,400..900,0..100&family=JetBrains+Mono:wght@400;500;600&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:opsz,wght,SOFT@9..144,400..900,0..100&family=JetBrains+Mono:wght@400;500;600&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
